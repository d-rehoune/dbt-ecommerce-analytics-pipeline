version: 2

models:
  - name: int_sales_database__order
    description: This model enriches order data with customer information, order item metrics, and customer feedback

    columns: 
      - name: order_id 
        description: Unique identifier for the order
      
      - name: user_id 
        description: Unique identifier for the customer 
      
      - name: order_status 
        description: Current status of the order 
        
      - name: order_created_at 
        description: Timestamp when the order was created 
        
      - name: order_approved_at 
        description: Timestamp when the payment was approved 
      
      - name: user_city 
        description: City where the customer is located 
      
      - name: user_state 
        description: State where the customer is located 
      
      - name: average_feedback_score 
        description: Average customer feedback score for the order 
      
      - name: total_order_amount 
        description: Total amount of the order, including product and shipping costs 
      
      - name: total_items 
        description: Total number of items purchased in the order 
      
      - name: total_distinct_items 
        description: Number of distinct products included in the order

  - name: int_sales_database__user
    description: This model enriches customer data with aggregated order metrics and purchasing behavior

    columns:
      - name: user_id 
        description: Unique identifier for the customer 
      
      - name: user_city 
        description: City where the customer is located 
      
      - name: user_state 
        description: State where the customer is located 
      
      - name: total_amount_spent 
        description: Total amount spent by the customer across all orders 
      
      - name: total_items 
        description: Total number of items purchased by the customer 
      
      - name: total_distinct_items 
        description: Total number of distinct products purchased by the customer 
      
      - name: total_orders 
        description: Total number of orders placed by the customer 
      
      - name: favorite_product_id 
        description: Identifier of the product most frequently purchased by the customer